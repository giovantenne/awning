# Awning v2: Docker Compose
# Static compose file for all services

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

networks:
  tor_net:
    driver: bridge
  awning_net:
    driver: bridge

services:
  # --- Tor SOCKS proxy and hidden services ---
  tor:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.tor
      args:
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: tor
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    networks:
      - tor_net
      - awning_net
    volumes:
      - ./configs/torrc:/etc/tor/torrc:ro
      - ./data/tor:/var/lib/tor

  # --- Bitcoin Core ---
  bitcoin:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.bitcoin
      args:
        BITCOIN_CORE_VERSION: ${BITCOIN_CORE_VERSION}
        BITCOIN_ARCH: ${BITCOIN_ARCH}
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: bitcoin
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BITCOIN_MEM_LIMIT:-4g}
    cpus: ${BITCOIN_CPUS:-2.0}
    networks:
      - tor_net
      - awning_net
    depends_on:
      tor:
        condition: service_started
    volumes:
      - ./data/bitcoin:/data/.bitcoin
      - ./configs/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
    command: -datadir=/data/.bitcoin

  # --- LND (Lightning Network Daemon) ---
  lnd:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.lnd
      args:
        LND_VERSION: ${LND_VERSION}
        LND_ARCH: ${LND_ARCH}
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: lnd
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    networks:
      - tor_net
      - awning_net
    depends_on:
      bitcoin:
        condition: service_healthy
      tor:
        condition: service_started
    ports:
      - "${LND_REST_BIND:-127.0.0.1}:${LND_REST_PORT:-8080}:8080"   # REST API (TLS)
    environment:
      NODE_ALIAS: ${NODE_ALIAS}
    volumes:
      - ./data/lnd:/data/.lnd
      - ./configs/lnd.conf:/data/.lnd/lnd.conf:ro

  # --- Electrs (Electrum Rust Server) ---
  electrs:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.electrs
      args:
        ELECTRS_VERSION: ${ELECTRS_VERSION}
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: electrs
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${ELECTRS_MEM_LIMIT:-2g}
    cpus: ${ELECTRS_CPUS:-1.0}
    networks:
      - tor_net
      - awning_net
    depends_on:
      bitcoin:
        condition: service_healthy
    ports:
      - "${ELECTRS_SSL_BIND:-127.0.0.1}:${ELECTRS_SSL_PORT:-50002}:50002"  # Electrs SSL (stunnel)
    volumes:
      - ./configs/electrs.toml:/data/electrs.toml:ro
      - ./data/electrs:/data/electrs_db
    healthcheck:
      test: ["CMD", "/usr/local/bin/electrs-healthcheck.sh"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

  # --- Static Channel Backup ---
  scb:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.scb
      args:
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: scb
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25
    networks:
      - awning_net
    depends_on:
      lnd:
        condition: service_started
    environment:
      SCB_REPO: ${SCB_REPO}
    volumes:
      - ./data/lnd:/lnd:ro
      - ./data/scb:/data

  # --- Ride The Lightning (web UI) ---
  rtl:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.rtl
      args:
        RTL_VERSION: ${RTL_VERSION:-0.15.8}
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: rtl
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    networks:
      - awning_net
    depends_on:
      lnd:
        condition: service_started
    ports:
      - "${RTL_BIND:-0.0.0.0}:${RTL_PORT:-3001}:3001"
    environment:
      RTL_CONFIG_PATH: /data/rtl
    volumes:
      - ./data/lnd:/data/lnd:ro
      - ./data/rtl:/data/rtl
