# Awning v2: Nginx configuration
# SSL termination for Electrs (TCP stream proxy)

user nginx;
worker_processes 1;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 256;
}

stream {
    # Resolve Docker service names dynamically to avoid stale upstream IPs
    # after container recreates/restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 4h;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Electrs SSL (port 50002) -> Electrs plain (port 50001)
    server {
        listen 50002 ssl;
        set $electrs_upstream electrs:50001;
        proxy_pass $electrs_upstream;
    }
}
